<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SenorScout - AR Price Scanner</title>

        <!-- PWA Meta Tags -->
        <meta name="theme-color" content="#8b5cf6" />
        <meta
            name="description"
            content="AI-Powered Price Scanner - Detect objects and get real-time price estimates"
        />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-status-bar-style"
            content="black-translucent"
        />
        <meta name="apple-mobile-web-app-title" content="SenorScout" />

        <!-- PWA Manifest -->
        <link rel="manifest" href="manifest.json" />
        <link rel="apple-touch-icon" href="icon-192.png" />

        <!-- PWA Service Worker -->
        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker
                        .register("sw.js")
                        .then((reg) => console.log("SW registered:", reg))
                        .catch((err) =>
                            console.log("SW registration failed:", err),
                        );
                });
            }
        </script>
    </head>
    <body>
        <div id="app">
            <!-- Header -->
            <header class="header">
                <h1 class="logo-text">📸 SenorScout</h1>
                <p class="header-subtitle">AI-Powered AR Price Scanner</p>
            </header>

            <!-- Status Bar -->
            <div class="status-bar-container">
                <div class="status-indicator">
                    <div class="status-dot" id="cameraStatus"></div>
                    <span class="status-text" id="cameraStatusText">Initializing...</span>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" onclick="switchTab('camera')">
                    <span class="tab-icon">📷</span>
                    <span>Camera</span>
                </div>
                <div class="tab" onclick="switchTab('upload')">
                    <span class="tab-icon">📁</span>
                    <span>Upload</span>
                </div>
                <div class="tab" onclick="switchTab('search')">
                    <span class="tab-icon">🔍</span>
                    <span>Search</span>
                </div>
            </div>

            <!-- Camera Tab -->
            <div class="tab-content active" id="cameraTab">
                <div class="scanner-box">
                    <div class="camera-viewport">
                        <div class="camera-placeholder" id="cameraPlaceholder">
                            <div class="placeholder-icon">📷</div>
                            <p>Tap "Start Camera" to begin scanning</p>
                        </div>
                        <video id="videoPreview" autoplay playsinline></video>
                        <canvas id="detectionCanvas" class="detection-overlay"></canvas>
                        <img id="capturedImage" class="captured-preview" alt="Captured frame" />
                        <div id="detectionStatus" class="scanning-badge">🔍 Scanning...</div>
                    </div>

                    <div class="scanner-controls">
                        <button
                            class="scanner-btn primary"
                            id="startCameraBtn"
                            onclick="startCamera()"
                        >
                            <span>📷 Start Camera</span>
                        </button>
                        <button
                            class="scanner-btn capture"
                            id="captureBtn"
                            onclick="captureImage()"
                            disabled
                        >
                            <span>⏺ Capture & Analyze</span>
                        </button>
                        <button
                            class="scanner-btn secondary"
                            id="stopCameraBtn"
                            onclick="stopCamera()"
                            style="display: none"
                        >
                            <span>⏹ Stop</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Upload Tab -->
            <div class="tab-content" id="uploadTab">
                <div class="scanner-box">
                    <label class="upload-area" for="imageInput">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">Tap to select an image</div>
                        <div class="upload-hint">or drag and drop here</div>
                    </label>
                    <input
                        type="file"
                        id="imageInput"
                        accept="image/*"
                        class="hidden"
                        onchange="handleFileSelect(event)"
                    />

                    <div class="image-preview-container" id="uploadedPreviewContainer">
                        <img id="uploadedPreview" class="preview-image" alt="Upload preview" />
                        <button class="remove-image" onclick="clearUpload()">×</button>
                    </div>

                    <div class="scanner-controls">
                        <button class="scanner-btn primary full-width" onclick="uploadSelectedImage()">
                            <span>🔍 Detect & Appraise</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Search Tab -->
            <div class="tab-content" id="searchTab">
                <div class="scanner-box">
                    <div class="search-form">
                        <div class="form-group">
                            <label for="keywordInput">What are you looking for?</label>
                            <input
                                type="text"
                                id="keywordInput"
                                class="search-input"
                                placeholder="Enter item name (e.g., iPhone 13, Nike shoes, Vintage watch...)"
                            />
                        </div>
                        <div class="scanner-controls">
                            <button class="scanner-btn primary full-width" onclick="searchByKeyword()">
                                <span>🔍 Search Market Prices</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="results-section" id="resultsSection" style="display: none">
                <div class="results-header">
                    <h2>📊 Analysis Results</h2>
                </div>

                <!-- Detections -->
                <div class="detection-panel" id="detectionPanel">
                    <h3 class="panel-title">🔍 Detected Objects</h3>
                    <div class="detected-grid" id="detectionResults"></div>
                </div>

                <!-- Appraisals -->
                <div class="appraisal-panel" id="appraisalPanel">
                    <h3 class="panel-title">💰 Market Valuation</h3>
                    <div class="appraisal-list" id="appraisalResults"></div>
                </div>
            </div>

            <!-- Footer -->
            <footer>
                <p>SenorScout AI Price Scanner</p>
                <p class="disclaimer">Prices are estimates based on market data</p>
            </footer>
        </div>

        <script type="module" src="/src/main.js"></script>
    </body>
</html>
